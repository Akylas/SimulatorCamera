name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      create_release:
        description: "Create GitHub release and tag"
        required: false
        type: boolean
        default: true

# ----------------------------
# 1. TEST JOB
# ----------------------------
jobs:
  test-spm:
    name: Swift Package tests
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: swift test
        run: swift test

# ----------------------------
# 2. BUILD MATRIX JOB
# ----------------------------
  build:
    name: Build, sign & package (${{ matrix.arch }})
    runs-on: macos-26
    needs: test-spm
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Install tools
        run: brew install xcodegen

      - name: Import signing cert
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$MAC_CERTIFICATE_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12
      

      # - name: Store notarytool credentials in keychain
      #   env:
      #     APPLE_ID:           ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #     APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     xcrun notarytool store-credentials "SimulatorCameraNotary" \
      #         --apple-id  "$APPLE_ID" \
      #         --password  "$APPLE_APP_PASSWORD" \
      #         --team-id   "$APPLE_TEAM_ID"


      - name: Compute new version
        id: version
        run: |
          # Latest semver tag, falling back to most recent version in CHANGELOG.md
          CURRENT=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
          if [[ -z "$CURRENT" ]]; then
            CURRENT=$(grep -oE '\[([0-9]+\.[0-9]+\.[0-9]+)\]' CHANGELOG.md | head -1 | tr -d '[]')
          fi
          # Falls back to 0.0.0 when no tag or CHANGELOG entry exists (first release from scratch)
          [[ -z "$CURRENT" ]] && CURRENT="0.0.0"

          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.bump_type }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            *)     PAT=$((PAT+1)) ;;
          esac

          NEW="${MAJ}.${MIN}.${PAT}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW"        >> "$GITHUB_OUTPUT"

      - name: Build & notarize
        env:
          VERSION: ${{ steps.version.outputs.new }}
          ARCH: ${{ matrix.arch }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_APP_CERT:    ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT }}
          # KEYCHAIN_PROFILE: SimulatorCameraNotary
        run: ./scripts/build-release.sh

      - name: Rename artifacts
        run: |
          VERSION="temp"
          ARCH="${{ matrix.arch }}"

          mv dist/*.dmg dist/app-${ARCH}.dmg
          mv dist/*.zip dist/app-${ARCH}.zip
          mv dist/*.sha256 dist/app-${ARCH}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/*

# ----------------------------
# 3. RELEASE JOB (ALL LOGIC HERE)
# ----------------------------
  release:
    name: Release + Changelog + Cask
    runs-on: macos-14
    needs: build
    if: inputs.create_release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Compute version once
      # ----------------------------
      - name: Compute version
        id: version
        run: |
          CURRENT=$(git tag --sort=-v:refname | grep -E '^v[0-9]+' | head -1 | sed 's/^v//')
          [[ -z "$CURRENT" ]] && CURRENT="0.0.0"

          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"

          case "${{ inputs.bump_type }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            *)     PAT=$((PAT+1)) ;;
          esac

          NEW="$MAJ.$MIN.$PAT"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      # ----------------------------
      # Download artifacts from BOTH builds
      # ----------------------------
      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: dist/arm64

      - name: Download x86_64
        uses: actions/download-artifact@v4
        with:
          name: mac-x86_64
          path: dist/x86_64

      # ----------------------------
      # Generate changelog
      # ----------------------------
      - name: Generate release notes
        if: inputs.create_release
        id: notes
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.current }}"
          NEW_VERSION="${{ steps.version.outputs.new }}"
          NOTES_FILE="$RUNNER_TEMP/release_notes.md"

          if git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            LOG=$(git log "${CURRENT_TAG}..HEAD" --format="%s" 2>/dev/null || true)
          else
            LOG=$(git log --format="%s" 2>/dev/null || true)
          fi

          BREAKING=$(printf '%s\n' "$LOG" | grep -E '^(feat|fix|refactor|perf)(\([^)]+\))?!:' || true)
          FEATURES=$(printf '%s\n' "$LOG" | grep -E '^feat(\([^)]+\))?[!]?:' | grep -v '!:' || true)
          FIXES=$(printf '%s\n' "$LOG" | grep -E '^fix(\([^)]+\))?[!]?:' | grep -v '!:' || true)
          OTHERS=$(printf '%s\n' "$LOG" | grep -E '^(chore|docs|style|refactor|perf|test|ci)(\([^)]+\))?:' || true)

          {
            if [[ -n "$BREAKING" ]]; then
              printf '### ⚠️ Breaking Changes\n\n'
              printf '%s\n' "$BREAKING" | sed 's/^/- /'
              printf '\n'
            fi
            if [[ -n "$FEATURES" ]]; then
              printf '### ✨ Features\n\n'
              printf '%s\n' "$FEATURES" | sed 's/^/- /'
              printf '\n'
            fi
            if [[ -n "$FIXES" ]]; then
              printf '### 🐛 Bug Fixes\n\n'
              printf '%s\n' "$FIXES" | sed 's/^/- /'
              printf '\n'
            fi
            if [[ -n "$OTHERS" ]]; then
              printf '### 🔧 Other Changes\n\n'
              printf '%s\n' "$OTHERS" | sed 's/^/- /'
              printf '\n'
            fi
            if [[ -z "$BREAKING$FEATURES$FIXES$OTHERS" ]]; then
              printf '<!-- no conventional commits found since %s -->\n\n' "$CURRENT_TAG"
            fi
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "${{ github.repository }}" "$CURRENT_TAG" "v${NEW_VERSION}"
          } > "$NOTES_FILE"

          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"


      # ----------------------------
      # Compute SHAs (IMPORTANT FIX)
      # ----------------------------
      - name: Compute SHA256
        id: sha
        run: |
          ARM_SHA=$(shasum -a 256 dist/arm64/*.dmg | awk '{print $1}')
          X86_SHA=$(shasum -a 256 dist/x86_64/*.dmg | awk '{print $1}')

          echo "arm=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "x86=$X86_SHA" >> $GITHUB_OUTPUT

      # ----------------------------
      # Update Homebrew cask
      # ----------------------------
      - name: Update cask
        run: |
          sed -i '' "s/ARM64_SHA256/${{ steps.sha.outputs.arm }}/" Casks/simulatorcamera.rb
          sed -i '' "s/X86_64_SHA256/${{ steps.sha.outputs.x86 }}/" Casks/simulatorcamera.rb

      # ----------------------------
      # Commit version bump (ONLY HERE)
      # ----------------------------
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md Casks/simulatorcamera.rb

          git commit -m "release: v${{ steps.version.outputs.new }}" || echo "No changes"
          git push

      # ----------------------------
      # Create tag
      # ----------------------------
      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ----------------------------
      # GitHub Release
      # ----------------------------
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: "SimulatorCamera ${{ steps.version.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            dist/arm64/*
            dist/x86_64/*