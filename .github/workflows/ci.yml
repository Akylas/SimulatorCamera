name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test --parallel

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app projects
        run: |
          xcodegen generate --spec apps/MacServer/project.yml
          xcodegen generate --spec apps/iOSDemo/project.yml

      - name: Build Mac server app
        run: |
          xcodebuild \
            -project apps/MacServer/SimulatorCameraServer.xcodeproj \
            -scheme SimulatorCameraServer \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS demo app
        run: |
          xcodebuild \
            -project apps/iOSDemo/SimCameraDemo.xcodeproj \
            -scheme SimCameraDemo \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            build

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict || true   # non-blocking until a config is committed
